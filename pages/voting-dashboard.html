<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Dashboard | Polling Unit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="voting-dashboard">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PU</span>
        <div>
          <p class="eyebrow">Voting dashboard</p>
          <p class="brand-name">Cast your ballot</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="../index.html">Home</a>
        <a href="../pages/voter-verification.html">Verify</a>
        <a href="../pages/election-results.html">Results</a>
      </nav>
    </header>

    <main class="page-content">
      <section class="section">
        <div class="section-heading">
          <span class="eyebrow">Official ballot</span>
          <h2>Select one candidate per position to complete your vote.</h2>
        </div>
        <div class="section-light">
          <p class="text-muted">Your selection is recorded once you submit. Review your ballot carefully; only one candidate may be selected per office.</p>
        </div>

        <form id="ballotForm" class="form-shell" novalidate>
          <div id="positionsContainer" class="section-grid"></div>
          <div class="ballot-footer">
            <button type="submit" class="button button-primary">Submit vote</button>
            <button id="resetBallot" type="button" class="button button-secondary">Reset selections</button>
          </div>
        </form>
      </section>
    </main>
  </div>
  <div id="toastContainer" aria-live="polite"></div>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
