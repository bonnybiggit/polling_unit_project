<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Management | Polling Unit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="voter-management">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PU</span>
        <div>
          <p class="eyebrow">Voter management</p>
          <p class="brand-name">Verified registration</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="candidate-management.html">Candidates</a>
        <a href="election-results.html">Results</a>
      </nav>
    </header>

    <main class="page-content">
      <section class="section">
        <div class="section-heading">
          <span class="eyebrow">Voter records</span>
          <h2>Search, view, and filter voters enrolled for this election.</h2>
        </div>
        <div class="button-row" style="margin-bottom: 18px; display:flex; gap: 12px; flex-wrap: wrap;">
          <input id="voterSearch" type="search" placeholder="Search voter by name or card" class="input-search">
        </div>
        <div class="table-shell">
          <table class="table" aria-label="Voter list">
            <thead>
              <tr>
                <th>Name</th>
                <th>Card number</th>
                <th>Polling area</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="voterTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <div id="toastContainer" aria-live="polite"></div>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
