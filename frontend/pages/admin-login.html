<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Polling Unit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="admin-login">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PU</span>
        <div>
          <p class="eyebrow">Admin access</p>
          <p class="brand-name">Election management</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="../index.html">Home</a>
        <a href="candidate-management.html">Candidates</a>
        <a href="voter-management.html">Voters</a>
      </nav>
    </header>

    <main class="page-content">
      <section class="section">
        <div class="section-heading">
          <span class="eyebrow">Administrator login</span>
          <h2>Sign in to monitor election progress and manage candidate and voter lists.</h2>
        </div>
        <form id="adminLoginForm" class="form-shell" novalidate>
          <div class="form-field">
            <label for="adminEmail">Email address</label>
            <input id="adminEmail" name="email" type="email" placeholder="admin@pollingunit.gov" required>
          </div>
          <div class="form-field">
            <label for="adminPassword">Password</label>
            <input id="adminPassword" name="password" type="password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="button button-primary">Log in</button>
        </form>
        <div class="section-light">
          <p class="text-muted">Admin sessions expire after a short period for security. Use only authorized credentials to access management tools.</p>
        </div>
      </section>
    </main>
  </div>
  <div id="toastContainer" aria-live="polite"></div>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
