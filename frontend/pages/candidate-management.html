<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Management | Polling Unit</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="candidate-management">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">PU</span>
        <div>
          <p class="eyebrow">Candidate management</p>
          <p class="brand-name">Maintain official ballots</p>
        </div>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="voter-management.html">Voters</a>
        <a href="election-results.html">Results</a>
      </nav>
    </header>

    <main class="page-content">
      <section class="section">
        <div class="section-heading">
          <span class="eyebrow">Manage candidates</span>
          <h2>Review and update candidate details for each office.</h2>
        </div>
        <div class="button-row" style="margin-bottom: 18px; display:flex; gap: 12px; flex-wrap: wrap;">
          <a class="button button-primary" href="#" id="addCandidate">Add new candidate</a>
          <input id="candidateSearch" type="search" placeholder="Search candidates" class="input-search">
        </div>
        <div id="candidateList" class="section-grid"></div>
      </section>
    </main>
  </div>
  <div id="toastContainer" aria-live="polite"></div>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
